<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1>Task Manager</h1>
    </header>

    <form id="task-form" class="task-form">
      <div class="form-group">
        <label for="title">Title <span class="required">*</span></label>
        <input type="text" id="title" name="title" required placeholder="What needs to be done?">
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="2" placeholder="Optional details..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="due_date">Due Date</label>
          <input type="date" id="due_date" name="due_date">
        </div>
        <button type="submit">Add Task</button>
      </div>

      <div class="form-group recurring-toggle">
        <label class="toggle-label">
          <input type="checkbox" id="recurring-toggle">
          <span class="toggle-switch"></span>
          Recurring
        </label>
      </div>
      <div id="recurrence-options" class="recurrence-options hidden">
        <div class="form-group">
          <label>Recurrence Type</label>
          <div class="recurrence-type-buttons">
            <button type="button" class="rec-type-btn active" data-type="weekly">Weekly</button>
            <button type="button" class="rec-type-btn" data-type="monthly">Monthly</button>
            <button type="button" class="rec-type-btn" data-type="quarterly">Quarterly</button>
          </div>
        </div>
        <div id="rec-weekly" class="rec-config">
          <label>Repeat on</label>
          <div class="weekday-checkboxes">
            <label><input type="checkbox" value="1"> Mon</label>
            <label><input type="checkbox" value="2"> Tue</label>
            <label><input type="checkbox" value="3"> Wed</label>
            <label><input type="checkbox" value="4"> Thu</label>
            <label><input type="checkbox" value="5"> Fri</label>
            <label><input type="checkbox" value="6"> Sat</label>
            <label><input type="checkbox" value="0"> Sun</label>
          </div>
        </div>
        <div id="rec-monthly" class="rec-config hidden">
          <label>Day of month</label>
          <select id="monthly-option">
            <option value="first">1st of the month</option>
            <option value="last">Last day of the month</option>
            <optgroup label="Specific day">
            </optgroup>
          </select>
        </div>
        <div id="rec-quarterly" class="rec-config hidden">
          <label>Day of quarter start</label>
          <select id="quarterly-option">
            <option value="first">1st of the month</option>
            <option value="last">Last day of the month</option>
            <optgroup label="Specific day">
            </optgroup>
          </select>
        </div>
      </div>
    </form>

    <div class="tab-bar">
      <button class="tab active" data-view="inbox">Inbox</button>
      <button class="tab" data-view="all">All</button>
      <button class="tab" data-view="week">This Week</button>
      <button class="tab" data-view="overdue">Overdue</button>
    </div>

    <div id="top-labels" class="top-labels"></div>

    <div id="label-filter" class="label-filter hidden">
      Filtering by: <span class="label-filter-name"></span>
      <button class="label-filter-clear">&times;</button>
    </div>

    <div id="task-list" class="task-list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
