<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Task Manager</h1>

    <form id="task-form" class="task-form">
      <div class="form-group">
        <label for="title">Title <span class="required">*</span></label>
        <input type="text" id="title" name="title" required placeholder="What needs to be done?">
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="2" placeholder="Optional details..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="due_date">Due Date</label>
          <input type="date" id="due_date" name="due_date">
        </div>
        <button type="submit">Add Task</button>
      </div>
    </form>

    <div class="tab-bar">
      <button class="tab active" data-view="inbox">Inbox</button>
      <button class="tab" data-view="all">All</button>
      <button class="tab" data-view="week">This Week</button>
    </div>

    <div id="task-list" class="task-list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
